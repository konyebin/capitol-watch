<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Capitol Watch — Congressional Trade Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,800;0,900;1,500;1,700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    --bg:#F7F5F0;
    --header:#1A1714;
    --accent:#C8873A;
    --accent-soft:#e9d4b3;
    --buy:#2D6A4F;
    --buy-soft:#dcebe3;
    --sell:#C1392B;
    --sell-soft:#f3dcd8;
    --ink:#1A1714;
    --muted:#736a5d;
    --faint:#a99f8f;
    --line:#e5dfd2;
    --line-strong:#d6cdba;
    --surface:#FFFDF8;
    --surface-2:#f1ece1;
    --party-d:#33608f;
    --party-r:#a23b34;
    --party-i:#6b6357;
    --radius:14px;
    --radius-sm:9px;
    --shadow:0 1px 2px rgba(26,23,20,.05), 0 8px 24px -16px rgba(26,23,20,.35);
    --maxw:560px;
    --ease:cubic-bezier(0.16,1,0.3,1);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'DM Sans',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  #root{min-height:100vh;}
  button{font-family:inherit;cursor:pointer;}
  input{font-family:inherit;}
  ::selection{background:var(--accent-soft);}

  .shell{
    max-width:var(--maxw);
    margin:0 auto;
    min-height:100vh;
    background:var(--bg);
    position:relative;
    padding-bottom:84px;
    box-shadow:0 0 60px -30px rgba(26,23,20,.4);
  }

  /* ---------- Header ---------- */
  .hdr{
    background:var(--header);
    color:#f3ead9;
    padding:18px 20px 16px;
    position:sticky;top:0;z-index:30;
    border-bottom:2px solid var(--accent);
  }
  .hdr-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
  .hdr-title{
    font-family:'Playfair Display',serif;
    font-weight:800;
    font-size:27px;
    line-height:1.0;
    letter-spacing:-.01em;
    margin:0;
    color:#fbf4e6;
  }
  .hdr-title .dot{color:var(--accent);}
  .hdr-sub{
    margin:6px 0 0;
    font-size:11.5px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:#b3a895;
    font-weight:500;
  }
  .status{display:flex;gap:10px;align-items:flex-start;flex-shrink:0;}
  .status-item{display:flex;flex-direction:column;align-items:center;gap:4px;width:30px;}
  .status-dot{width:9px;height:9px;border-radius:50%;background:var(--faint);position:relative;}
  .status-dot.live{background:#52b788;box-shadow:0 0 0 3px rgba(82,183,136,.18);}
  .status-dot.error{background:#d0563f;box-shadow:0 0 0 3px rgba(208,86,63,.18);}
  .status-dot.loading{background:#caa35f;animation:pulse 1.1s var(--ease) infinite;}
  @keyframes pulse{0%,100%{opacity:.4;}50%{opacity:1;}}
  .status-label{font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;color:#8f8472;font-weight:500;}
  .refresh-btn{margin-top:8px;display:inline-flex;align-items:center;gap:5px;background:rgba(255,253,248,.07);border:1px solid #3d3225;color:#b3a895;font-size:10.5px;font-weight:600;letter-spacing:.03em;padding:4px 9px;border-radius:7px;cursor:pointer;transition:.15s var(--ease);}
  .refresh-btn:active{transform:scale(.96);}
  .refresh-ico{display:inline-block;font-size:12px;line-height:1;color:var(--accent);}
  .refresh-ico.spin{animation:spin .8s linear infinite;}

  /* ---------- Generic ---------- */
  .view{padding:18px 16px 8px;animation:fade .35s var(--ease);}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:700;margin:0 0 4px;}
  .section-title{font-family:'Playfair Display',serif;font-weight:700;font-size:21px;margin:0 0 2px;letter-spacing:-.01em;}
  .section-note{font-size:12.5px;color:var(--muted);margin:0 0 14px;line-height:1.45;}
  .mono{font-family:'DM Mono',monospace;}
  .stack{display:flex;flex-direction:column;gap:11px;}
  .empty{padding:38px 18px;text-align:center;color:var(--muted);font-size:14px;line-height:1.5;}
  .empty .big{font-size:34px;display:block;margin-bottom:8px;opacity:.5;}

  /* ---------- Filter bar ---------- */
  .searchbar{
    display:flex;align-items:center;gap:8px;
    background:var(--surface);border:1px solid var(--line-strong);
    border-radius:11px;padding:10px 12px;margin-bottom:12px;
  }
  .searchbar input{border:0;outline:0;background:transparent;flex:1;font-size:14.5px;color:var(--ink);min-width:0;}
  .searchbar svg{flex-shrink:0;color:var(--faint);}
  .filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
  .chip{
    border:1px solid var(--line-strong);background:var(--surface);
    color:var(--muted);font-size:12.5px;font-weight:600;
    padding:7px 12px;border-radius:999px;transition:.18s var(--ease);
    min-height:34px;
  }
  .chip:active{transform:scale(.96);}
  .chip.on{background:var(--ink);color:#f7f1e4;border-color:var(--ink);}
  .chip.on.buy{background:var(--buy);border-color:var(--buy);}
  .chip.on.sell{background:var(--sell);border-color:var(--sell);}
  .filter-group{display:flex;gap:6px;flex-wrap:wrap;}
  .filter-label{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);font-weight:700;align-self:center;margin-right:2px;}
  .result-count{font-size:11.5px;color:var(--faint);margin:-4px 0 12px;font-weight:500;}

  /* ---------- Trade card ---------- */
  .tcard{
    position:relative;background:var(--surface);
    border:1px solid var(--line);border-radius:var(--radius);
    padding:13px 14px;box-shadow:var(--shadow);
    display:flex;gap:12px;align-items:stretch;
    transition:transform .14s var(--ease), box-shadow .2s var(--ease);
    text-align:left;width:100%;color:inherit;
    touch-action:pan-y;overflow:hidden;
  }
  .tcard:active{transform:scale(.985);}
  .tcard.swiped{box-shadow:0 1px 2px rgba(26,23,20,.05), 0 12px 30px -14px rgba(26,23,20,.45);}
  .tcard-side{width:4px;border-radius:4px;flex-shrink:0;}
  .tcard-side.buy{background:var(--buy);}
  .tcard-side.sell{background:var(--sell);}
  .tcard-body{flex:1;min-width:0;}
  .tcard-top{display:flex;align-items:center;gap:7px;margin-bottom:7px;flex-wrap:wrap;}
  .pill{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:3px 7px;border-radius:6px;}
  .pill.buy{background:var(--buy-soft);color:var(--buy);}
  .pill.sell{background:var(--sell-soft);color:var(--sell);}
  .member-name{font-weight:700;font-size:14.5px;color:var(--ink);}
  .party{font-size:10px;font-weight:700;width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;border-radius:4px;color:#fff;flex-shrink:0;}
  .party.D{background:var(--party-d);}
  .party.R{background:var(--party-r);}
  .party.I{background:var(--party-i);}
  .tcard-tick{display:flex;align-items:baseline;gap:8px;}
  .ticker{font-family:'DM Mono',monospace;font-weight:500;font-size:19px;letter-spacing:.02em;color:var(--ink);}
  .company{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .tcard-meta{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap;}
  .amount{font-family:'DM Mono',monospace;font-size:12.5px;color:var(--ink);font-weight:500;}
  .sector-tag{font-size:10.5px;color:var(--muted);background:var(--surface-2);padding:2px 7px;border-radius:5px;}
  .tcard-right{display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;flex-shrink:0;gap:6px;}
  .age{font-size:11.5px;color:var(--faint);font-weight:600;white-space:nowrap;}
  .perf-chip{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;padding:2px 6px;border-radius:6px;white-space:nowrap;font-variant-numeric:tabular-nums;}
  .perf-chip.up{color:var(--buy);background:var(--buy-soft);}
  .perf-chip.down{color:var(--sell);background:var(--sell-soft);}
  .flag{font-size:10px;font-weight:700;color:var(--sell);background:var(--sell-soft);padding:3px 7px;border-radius:6px;display:inline-flex;align-items:center;gap:3px;white-space:nowrap;}
  .src-tag{font-size:9.5px;color:var(--faint);letter-spacing:.05em;text-transform:uppercase;font-weight:600;}

  /* ---------- Bottom sheet ---------- */
  .overlay{position:fixed;inset:0;background:rgba(26,23,20,.42);z-index:60;animation:fade .25s var(--ease);backdrop-filter:blur(2px);}
  .sheet{
    position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:var(--maxw);
    background:var(--bg);border-radius:22px 22px 0 0;z-index:61;
    padding:8px 0 26px;max-height:90vh;overflow-y:auto;
    animation:slideup .34s var(--ease);box-shadow:0 -10px 40px -12px rgba(26,23,20,.5);
  }
  @keyframes slideup{from{transform:translate(-50%,100%);}to{transform:translate(-50%,0);}}
  .sheet-grab{width:38px;height:4px;border-radius:4px;background:var(--line-strong);margin:8px auto 4px;}
  .sheet-inner{padding:8px 20px 0;}
  .sheet-x{position:absolute;top:14px;right:16px;border:0;background:var(--surface-2);width:30px;height:30px;border-radius:50%;color:var(--muted);font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center;}
  .detail-head{display:flex;align-items:center;gap:9px;margin:6px 0 2px;flex-wrap:wrap;}
  .detail-ticker{font-family:'DM Mono',monospace;font-size:32px;font-weight:500;}
  .detail-company{font-size:13.5px;color:var(--muted);margin-bottom:16px;}
  .kv{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);gap:14px;}
  .kv:last-child{border-bottom:0;}
  .kv-k{font-size:12px;letter-spacing:.07em;text-transform:uppercase;color:var(--faint);font-weight:600;}
  .kv-v{font-size:14px;font-weight:600;text-align:right;color:var(--ink);}
  .kv-v.mono{font-family:'DM Mono',monospace;font-weight:500;}
  .conflict-box{background:var(--sell-soft);border:1px solid #e7bdb4;border-radius:var(--radius-sm);padding:13px 14px;margin:16px 0 4px;}
  .conflict-box .ct{font-weight:700;color:var(--sell);font-size:13px;margin-bottom:5px;display:flex;align-items:center;gap:6px;}
  .conflict-box .cd{font-size:12.5px;color:#6e3b33;line-height:1.5;}
  .lag-note{font-size:12px;color:var(--muted);background:var(--surface-2);border-radius:var(--radius-sm);padding:10px 12px;margin-top:14px;line-height:1.45;}
  .lag-note b{color:var(--ink);}

  /* ---------- Price performance box ---------- */
  .perf-box{margin-top:12px;border-radius:var(--radius-sm);padding:13px 14px;border:1px solid var(--line);position:relative;overflow:hidden;}
  .perf-box.perf-good{background:linear-gradient(180deg,var(--buy-soft),rgba(220,235,227,.35));border-color:#bcd9c9;}
  .perf-box.perf-bad{background:linear-gradient(180deg,var(--sell-soft),rgba(243,220,216,.35));border-color:#e6c6c0;}
  .perf-head{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .perf-verdict{font-weight:800;font-size:14px;letter-spacing:-.01em;color:var(--ink);}
  .perf-pct{font-family:'DM Mono',monospace;font-weight:500;font-size:19px;font-variant-numeric:tabular-nums;}
  .perf-pct.up{color:var(--buy);}
  .perf-pct.down{color:var(--sell);}
  .perf-prices{display:flex;align-items:center;gap:14px;margin-top:11px;}
  .perf-col{display:flex;flex-direction:column;gap:2px;}
  .perf-lab{font-size:9.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);font-weight:600;}
  .perf-val{font-size:16px;font-weight:500;color:var(--ink);}
  .perf-arrow{color:var(--faint);font-size:16px;}
  .perf-note{margin-top:10px;font-size:11.5px;color:var(--muted);line-height:1.45;}
  .linklike{color:var(--accent);font-weight:700;text-decoration:underline;text-underline-offset:2px;cursor:pointer;background:none;border:0;padding:0;font-size:inherit;}

  /* ---------- Member / committee rows ---------- */
  .row{
    display:flex;align-items:center;gap:12px;background:var(--surface);
    border:1px solid var(--line);border-radius:var(--radius);padding:13px 14px;
    box-shadow:var(--shadow);width:100%;text-align:left;color:inherit;transition:transform .14s var(--ease);
  }
  .row:active{transform:scale(.99);}
  .row-main{flex:1;min-width:0;}
  .row-name{font-weight:700;font-size:15px;display:flex;align-items:center;gap:7px;}
  .row-sub{font-size:12px;color:var(--muted);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap;}
  .row-sub .conf{color:var(--sell);font-weight:600;}
  .star{border:0;background:none;font-size:21px;line-height:1;color:var(--faint);padding:6px;flex-shrink:0;transition:transform .15s var(--ease);}
  .star.on{color:var(--accent);}
  .star:active{transform:scale(1.25);}
  .chev{color:var(--faint);flex-shrink:0;}
  .mini-stat{display:flex;flex-direction:column;align-items:center;flex-shrink:0;padding:0 4px;}
  .mini-stat .n{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;}
  .mini-stat .l{font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);}

  /* ---------- Profile ---------- */
  .back{display:inline-flex;align-items:center;gap:5px;border:0;background:none;color:var(--muted);font-size:13px;font-weight:600;padding:2px 0;margin-bottom:10px;}
  .profile-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:6px;}
  .profile-name{font-family:'Playfair Display',serif;font-weight:800;font-size:26px;line-height:1.05;letter-spacing:-.01em;margin:0;}
  .profile-meta{font-size:13px;color:var(--muted);margin:6px 0 0;display:flex;gap:9px;align-items:center;flex-wrap:wrap;}
  .badge{display:inline-flex;align-items:center;gap:5px;background:var(--surface-2);padding:3px 9px;border-radius:6px;font-size:11.5px;font-weight:600;color:var(--muted);}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:15px 15px;box-shadow:var(--shadow);margin-bottom:14px;}
  .card-h{font-family:'Playfair Display',serif;font-weight:700;font-size:16.5px;margin:0 0 11px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .card-h .cnt{font-family:'DM Sans';font-size:11px;font-weight:700;color:var(--faint);letter-spacing:.05em;}
  .comm-item{padding:10px 0;border-bottom:1px solid var(--line);}
  .comm-item:first-of-type{padding-top:0;}
  .comm-item:last-child{border-bottom:0;padding-bottom:0;}
  .comm-name{font-weight:600;font-size:13.5px;}
  .comm-reg{font-size:11.5px;color:var(--muted);margin-top:3px;}
  .reg-tag{display:inline-block;font-size:10.5px;background:var(--accent-soft);color:#8a5a1e;padding:2px 7px;border-radius:5px;margin:3px 4px 0 0;font-weight:600;}
  .conf-line{font-size:12.5px;color:#6e3b33;line-height:1.5;padding:8px 0;border-bottom:1px dashed #e7c9c1;}
  .conf-line:last-child{border-bottom:0;}
  .conf-line b{color:var(--sell);}

  /* ---------- AI panel ---------- */
  .ai{
    background:linear-gradient(160deg,#211c17,#312820);
    border-radius:var(--radius);padding:15px 15px 16px;margin:6px 0 16px;
    color:#efe6d6;border:1px solid #3d3225;
  }
  .ai-h{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
  .ai-h .spark{color:var(--accent);}
  .ai-title{font-family:'Playfair Display',serif;font-weight:700;font-size:16px;color:#f6eede;}
  .ai-desc{font-size:11.5px;color:#b3a895;margin:0 0 12px;line-height:1.45;}
  .ai-btn{
    background:var(--accent);color:#1a1510;border:0;font-weight:700;font-size:13px;
    padding:10px 16px;border-radius:9px;display:inline-flex;align-items:center;gap:7px;
    transition:.18s var(--ease);min-height:40px;
  }
  .ai-btn:active{transform:scale(.97);}
  .ai-btn:disabled{opacity:.6;}
  .ai-out{
    background:rgba(255,253,248,.06);border:1px solid #463a2b;border-radius:10px;
    padding:13px 14px;margin-top:13px;font-size:13.5px;line-height:1.6;color:#ece2d1;
    white-space:pre-wrap;animation:fade .3s var(--ease);
  }
  .ai-out p{margin:0 0 9px;}
  .ai-out p:last-child{margin:0;}
  .ai-err{margin-top:12px;font-size:12px;color:#e6b9ad;background:rgba(193,57,43,.16);border:1px solid #6e3127;padding:10px 12px;border-radius:9px;line-height:1.45;}
  .ai-ask{display:flex;gap:7px;margin-top:12px;}
  .ai-ask input{flex:1;min-width:0;background:rgba(255,253,248,.07);border:1px solid #463a2b;border-radius:9px;color:#f3ead9;padding:10px 12px;font-size:13px;outline:0;}
  .ai-ask input::placeholder{color:#8f8472;}
  .ai-ask button{background:rgba(200,135,58,.18);color:var(--accent);border:1px solid #5e4a2e;border-radius:9px;padding:0 14px;font-weight:700;font-size:13px;}
  .ai-spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(26,21,16,.35);border-top-color:#1a1510;border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .ai-loading{display:flex;align-items:center;gap:9px;font-size:12.5px;color:#b3a895;margin-top:13px;}
  .ai-loading .d{width:12px;height:12px;border:2px solid #5e4a2e;border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}

  /* ---------- Trends ---------- */
  .bar-row{margin-bottom:11px;}
  .mover-controls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
  .seg{display:inline-flex;background:var(--surface-2);border-radius:8px;padding:2px;gap:2px;}
  .seg-btn{border:0;background:transparent;color:var(--muted);font-size:11.5px;font-weight:600;padding:5px 10px;border-radius:6px;transition:.15s var(--ease);white-space:nowrap;}
  .seg-btn.on{background:var(--surface);color:var(--ink);box-shadow:0 1px 2px rgba(26,23,20,.08);}
  .seg-btn:active{transform:scale(.96);}
  .mover-sub{font-size:10.5px;color:var(--faint);margin-top:4px;font-weight:500;}
  .bar-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;gap:10px;}
  .bar-label{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;}
  .bar-label .tk{font-family:'DM Mono',monospace;}
  .bar-val{font-family:'DM Mono',monospace;font-size:11.5px;color:var(--muted);}
  .bar-track{height:9px;background:var(--surface-2);border-radius:6px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:6px;transition:width .6s var(--ease);}
  .twocol{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
  .leader{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--line);}
  .leader:last-child{border-bottom:0;}
  .leader .rk{font-family:'DM Mono',monospace;font-size:12px;color:var(--faint);width:16px;}
  .leader .tk{font-family:'DM Mono',monospace;font-weight:500;font-size:14px;}
  .leader .who{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .leader .amt{font-family:'DM Mono',monospace;font-size:11px;margin-left:auto;color:var(--ink);}
  .party-split{display:flex;height:30px;border-radius:9px;overflow:hidden;margin:4px 0 8px;font-size:12px;font-weight:700;color:#fff;}
  .party-split .d{background:var(--party-d);display:flex;align-items:center;justify-content:center;}
  .party-split .r{background:var(--party-r);display:flex;align-items:center;justify-content:center;}
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
  .stat-box{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px 6px;text-align:center;box-shadow:var(--shadow);}

function ageLabel(iso){
  const d = new Date(iso + "T00:00:00");
  const now = new Date();
  const ms = now - d;
  if(ms < 0) return "today";
  const days = Math.floor(ms / 86400000);
  if(days <= 0) return "today";
  if(days < 7)  return days + "d ago";
  if(days < 56) return Math.floor(days/7) + "w ago";
  let years = now.getFullYear() - d.getFullYear();
  let months = now.getMonth() - d.getMonth();
  if(now.getDate() < d.getDate()) months--;
  if(months < 0){ years--; months += 12; }
  if(years < 1){ return Math.max(1, years*12 + months) + "mo ago"; }
  return months > 0 ? (years + "y " + months + "mo ago") : (years + "y ago");
}
function timeAgoShort(d){
  if(!d) return "just now";
  const s = Math.floor((Date.now() - d.getTime())/1000);
  if(s < 45) return "just now";
  if(s < 3600) return Math.floor(s/60) + "m ago";
  if(s < 86400) return Math.floor(s/3600) + "h ago";
  return Math.floor(s/86400) + "d ago";
}
function lagDays(t){
  return Math.max(0, Math.round((new Date(t.filingDate) - new Date(t.tradeDate)) / 86400000));
}
/* price move since the trade + a hindsight timing verdict */
function priceInfo(t){
  const p0 = parseFloat(t.priceAtTrade), p1 = parseFloat(t.priceCurrent);
  if(!isFinite(p0) || !isFinite(p1) || p0 <= 0) return null;
  const pct = ((p1 - p0) / p0) * 100;
  const up = pct >= 0;
  // verdict: did the trade direction look smart given the move?
  let verdict, good;
  if(t.type === "buy"){
    good = up;
    verdict = up ? "Well-timed buy" : "Underwater since";
  }else{
    good = !up;
    verdict = up ? "Sold before a rise" : "Dodged the drop";
  }
  return { p0, p1, pct, up, verdict, good };
}
function fmtPct(pct){ return (pct >= 0 ? "+" : "") + pct.toFixed(1) + "%"; }

  try{ return new Date(iso+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}); }
  catch(e){ return iso; }
}

  if(n >= 1e6) return "$" + (n/1e6).toFixed(n>=1e7?0:1) + "M";

  return "$" + n;
}

/* normalize unknown live payloads defensively */
function pick(o, keys){ for(const k of keys){ if(o[k]!=null && o[k]!=="") return o[k]; } return undefined; }
function normalizeLive(json, sourceName){
  const arr = Array.isArray(json) ? json : (json && (json.data || json.trades || json.results)) || [];
  if(!Array.isArray(arr)) return [];
  const out = [];
  arr.forEach((raw, i) => {
    try{
      if(!raw || typeof raw !== "object") return;
      const member = pick(raw,["member","representative","senator","name","politician","full_name"]);
      const ticker = pick(raw,["ticker","symbol","asset","ticker_symbol"]);
      if(!member || !ticker) return;
      const rawType = (pick(raw,["type","transaction","transaction_type","action","txType"]) || "").toString().toLowerCase();
      const type = /sell|sale|sold|divest/.test(rawType) ? "sell" : "buy";
      const tradeDate = pick(raw,["trade_date","tradeDate","transaction_date","traded","date","transactionDate"]);
      const filingDate = pick(raw,["filing_date","filingDate","disclosure_date","filed","reportDate","disclosureDate"]) || tradeDate;
      out.push(enrich({
        id: "live-" + sourceName + "-" + (pick(raw,["id","_id"]) || i),
        member: String(member),
        ticker: String(ticker).toUpperCase().slice(0,6),
        type,
        amount: pick(raw,["amount","range","value","amount_range"]) || A.s,
        tradeDate: (tradeDate || "").slice(0,10),
        filingDate: (filingDate || "").slice(0,10),
        source: sourceName,
        party: pick(raw,["party"]),
        state: pick(raw,["state"]),
        chamber: pick(raw,["chamber"]),
        company: pick(raw,["company"]),
        sector: pick(raw,["sector"]),
        priceAtTrade: pick(raw,["price_at_trade","priceAtTrade"]),
        priceCurrent: pick(raw,["price_current","priceCurrent"]),
        priceUpdated: pick(raw,["price_updated","priceUpdated"])
      }));
    }catch(e){ /* skip bad row */ }
  });
  return out.filter(t => t.tradeDate && /^\d{4}-\d{2}-\d{2}$/.test(t.tradeDate));
}
function sig(t){ return [t.member,t.ticker,t.tradeDate,t.type].join("|").toLowerCase(); }

/* Fetch one source's rows from Supabase (PostgREST). Throws on non-2xx so the
   caller can mark that source's status dot red and fall back to sample data. */
async function fetchTradesBySource(source){
  const url = SUPABASE_URL + "/rest/v1/" + TRADES_TABLE +
    "?select=*&source=eq." + encodeURIComponent(source) +
    "&order=trade_date.desc";
  const ctrl = new AbortController();
  const to = setTimeout(()=>ctrl.abort(), 7000);
  try{
    const res = await fetch(url, {
      signal: ctrl.signal,
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY,
        accept: "application/json"
      }
    });
    if(!res.ok) throw new Error("HTTP " + res.status);
    return await res.json();
  } finally { clearTimeout(to); }
}

function TradeCard({ t, onOpen }){
  const ref = useRef(null);
  const start = useRef(0);
  const [dx, setDx] = useState(0);

  function onStart(e){ start.current = e.touches ? e.touches[0].clientX : e.clientX; }
  function onMove(e){
    if(!start.current) return;
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const delta = x - start.current;
    if(Math.abs(delta) > 4) setDx(Math.max(-60, Math.min(60, delta)));
  }
  function onEnd(){ start.current = 0; setDx(0); }

  return (
    <button
      ref={ref}
      className={"tcard" + (dx ? " swiped" : "")}
      style={{ transform: dx ? "translateX(" + dx*0.4 + "px)" : "" }}
      onClick={()=>onOpen(t)}
      onTouchStart={onStart} onTouchMove={onMove} onTouchEnd={onEnd}
    >
      <span className={"tcard-side " + t.type}></span>
      <span className="tcard-body">
        <span className="tcard-top">
          <span className={"pill " + t.type}>{t.type}</span>
          <span className="member-name">{t.member}</span>
          <span className={"party " + t.party}>{t.party}</span>
          <span className="src-tag">{t.state}</span>
        </span>
        <span className="tcard-tick">
          <span className="ticker">{t.ticker}</span>
          <span className="company">{t.company}</span>
        </span>
        <span className="tcard-meta">
          <span className="amount">{t.amount}</span>
          <span className="sector-tag">{t.sector}</span>
        </span>
      </span>
      <span className="tcard-right">
        <span className="age">{ageLabel(t.tradeDate)}</span>
        {(()=>{ const pi = priceInfo(t); return pi ? (
          <span className={"perf-chip " + (pi.up ? "up" : "down")}>{fmtPct(pi.pct)}</span>
        ) : null; })()}
        {t.isConflict && <span className="flag">{I.flag()} conflict</span>}
        <span className="src-tag">{t.source}</span>
      </span>
    </button>
  );
}

function Feed({ trades, onOpen }){
  const [chamber, setChamber] = useState("All");
  const [source, setSource] = useState("All");
  const [side, setSide] = useState("All");
  const [query, setQuery] = useState("");

  const filtered = useMemo(()=>{
    const q = query.trim().toLowerCase();
    return trades.filter(t=>{
      if(chamber!=="All" && t.chamber!==chamber) return false;
      if(source!=="All" && t.source!==source) return false;
      if(side!=="All" && t.type!==side) return false;
      if(q){
        const hay = (t.member+" "+t.ticker+" "+t.company+" "+t.sector+" "+t.state).toLowerCase();
        if(!hay.includes(q)) return false;
      }
      return true;
    });
  },[trades,chamber,source,side,query]);

  const ctx = filtered.slice(0,30).map(t=>`${t.member} (${t.party}-${t.state}) ${t.type} ${t.ticker}/${t.sector} ${t.amount} on ${t.tradeDate}${t.isConflict?" [CONFLICT]":""}`).join("\n");

  return (
    <div className="view">
      <p className="eyebrow">The Feed</p>
      <h2 className="section-title">Latest disclosures</h2>
      <p className="section-note">Congressional stock transactions across the Senate and House, newest trade first.</p>

      <div className="searchbar">

      </div>

      <div className="filters">
        <span className="filter-label">Chamber</span>
        {["All","Senate","House"].map(c=>
          <button key={c} className={"chip"+(chamber===c?" on":"")} onClick={()=>setChamber(c)}>{c}</button>)}
      </div>
      <div className="filters">
        <span className="filter-label">Source</span>
        {["All","Senate","House","Capitol Trades"].map(s=>
          <button key={s} className={"chip"+(source===s?" on":"")} onClick={()=>setSource(s)}>{s}</button>)}
      </div>
      <div className="filters">
        <span className="filter-label">Side</span>
        {["All","buy","sell"].map(s=>
          <button key={s} className={"chip"+(side===s?(" on "+s):"")} onClick={()=>setSide(s)}>{s==="All"?"All":s[0].toUpperCase()+s.slice(1)}</button>)}
      </div>

      <div className="result-count">{filtered.length} trade{filtered.length===1?"":"s"}{filtered.filter(t=>t.isConflict).length>0 && " · "+filtered.filter(t=>t.isConflict).length+" flagged"}</div>

      <AIPanel
        title="Feed analysis"
        desc="Let Claude surface patterns, clustered buys, and conflicts in the trades currently shown."
        autoPrompt={"Analyze these congressional trades. Identify the 3-4 most notable patterns — clustered buying/selling, sectors in focus, and any potential committee conflicts. Keep it under 180 words.\n\nTRADES:\n"+ctx}

          : filtered.map(t=> <TradeCard key={t.id} t={t} onOpen={onOpen} />)}

  );
}

/* ============================================================
   TRENDS
============================================================ */
function Trends({ trades }){
  const [group, setGroup] = useState("All");
  const [metric, setMetric] = useState("move");   // "move" | "activity"

  const movers = useMemo(()=>{
    const inGroup = (t)=>{
      if(group === "All") return true;
      if(group === "Senate" || group === "House") return t.chamber === group;
      return t.party === group;   // D / R
    };
    const map = {};
    trades.filter(inGroup).forEach(t=>{
      const m = (map[t.ticker] = map[t.ticker] || {
        ticker:t.ticker, company:t.company, n:0, priced:0, sumAbs:0, sumSigned:0, buys:0, sells:0
      });
      m.n++;
      if(t.type === "buy") m.buys++; else m.sells++;
      const pi = priceInfo(t);
      if(pi){ m.priced++; m.sumAbs += Math.abs(pi.pct); m.sumSigned += pi.pct; }
    });
    let arr = Object.values(map);
    if(metric === "move"){
      arr = arr.filter(m=>m.priced>0)
        .map(m=>({...m, avgAbs:m.sumAbs/m.priced, avgSigned:m.sumSigned/m.priced}))
        .sort((a,b)=>b.avgAbs-a.avgAbs);
    }else{
      arr = arr.sort((a,b)=>b.n-a.n);
    }
    return arr.slice(0,10);
  },[trades, group, metric]);

  const maxMover = Math.max(1, ...movers.map(m=> metric==="move" ? m.avgAbs : m.n));
  const GROUPS = [["All","All"],["D","Dem"],["R","Rep"],["Senate","Senate"],["House","House"]];

  const stats = useMemo(()=>{
    const byTicker={}, bySector={}, byParty={D:{n:0,v:0},R:{n:0,v:0},I:{n:0,v:0}};
    trades.forEach(t=>{
      (byTicker[t.ticker] = byTicker[t.ticker] || {ticker:t.ticker,company:t.company,sector:t.sector,n:0,v:0}).n++;
      byTicker[t.ticker].v += t.est;
      (bySector[t.sector] = bySector[t.sector] || {sector:t.sector,n:0,v:0}).n++;
      bySector[t.sector].v += t.est;
      const p = byParty[t.party] ? t.party : "I";
      byParty[p].n++; byParty[p].v += t.est;
    });
    const tickers = Object.values(byTicker).sort((a,b)=>b.n-a.n).slice(0,8);
    const sectors = Object.values(bySector).sort((a,b)=>b.v-a.v);
    const buys = trades.filter(t=>t.type==="buy").sort((a,b)=>b.est-a.est).slice(0,5);
    const sells = trades.filter(t=>t.type==="sell").sort((a,b)=>b.est-a.est).slice(0,5);
    return { tickers, sectors, buys, sells, byParty, total:trades.length,
             conflicts: trades.filter(t=>t.isConflict).length,
             volume: trades.reduce((s,t)=>s+t.est,0) };
  },[trades]);

  const maxSec = Math.max(1, ...stats.sectors.map(s=>s.v));
  const pv = stats.byParty.D.v + stats.byParty.R.v || 1;
  const dPct = Math.round(stats.byParty.D.v/pv*100);

  const ctx =
    `Total trades: ${stats.total}, flagged conflicts: ${stats.conflicts}, est volume: ${abbrUSD(stats.volume)}\n`+
    `Most traded: ${stats.tickers.map(t=>t.ticker+"("+t.n+")").join(", ")}\n`+
    `Sector volume: ${stats.sectors.map(s=>s.sector+" "+abbrUSD(s.v)).join(", ")}\n`+
    `Party split by volume: D ${dPct}% / R ${100-dPct}%\n`+
    `Top buys: ${stats.buys.map(t=>t.member+" "+t.ticker).join(", ")}\n`+
    `Top sells: ${stats.sells.map(t=>t.member+" "+t.ticker).join(", ")}`;

  return (
    <div className="view">
      <p className="eyebrow">Trends</p>
      <h2 className="section-title">The money map</h2>
      <p className="section-note">Aggregate signal across every disclosed trade in the dataset.</p>

      <div className="stat-grid">
        <div className="stat-box"><div className="n">{stats.total}</div><div className="l">Trades</div></div>
        <div className="stat-box"><div className="n">{abbrUSD(stats.volume)}</div><div className="l">Est. volume</div></div>
        <div className="stat-box"><div className="n" style={{color:"var(--sell)"}}>{stats.conflicts}</div><div className="l">Conflicts</div></div>
      </div>

      <AIPanel
        title="Congress-wide AI analysis"
        desc="Claude reads the aggregate trends and reports the headline story."
        autoPrompt={"You are looking at aggregate congressional trading stats. Write a sharp, neutral 'state of the tape' briefing: what sectors and names dominate, notable party patterns, and where the conflict risk concentrates. Under 200 words.\n\n"+ctx}
        context={ctx}
      />

      <div className="card">
        <div className="card-h">
          Biggest movers
          <span className="cnt">{metric==="move" ? "avg move since trade" : "by trade count"}</span>
        </div>
        <div className="mover-controls">
          <div className="seg">
            {GROUPS.map(([val,lab])=>(
              <button key={val} className={"seg-btn"+(group===val?" on":"")} onClick={()=>setGroup(val)}>{lab}</button>
            ))}
          </div>
          <div className="seg">
            <button className={"seg-btn"+(metric==="move"?" on":"")} onClick={()=>setMetric("move")}>Price move</button>
            <button className={"seg-btn"+(metric==="activity"?" on":"")} onClick={()=>setMetric("activity")}>Activity</button>
          </div>
        </div>
        {movers.length===0 ? (
          <div className="comm-reg">No priced trades in this group yet.</div>
        ) : movers.map(m=>{
          const val = metric==="move" ? m.avgSigned : m.n;
          const mag = metric==="move" ? m.avgAbs : m.n;
          const up = m.avgSigned >= 0;
          return (
            <div key={m.ticker} className="bar-row">
              <div className="bar-top">
                <span className="bar-label">
                  <span className="tk">{m.ticker}</span>{" "}
                  <span style={{color:"var(--muted)",fontWeight:400,fontSize:12}}>{m.company}</span>
                </span>
                <span className="bar-val" style={metric==="move"?{color:up?"var(--buy)":"var(--sell)"}:{}}>
                  {metric==="move" ? fmtPct(m.avgSigned) : (m.n+"×")}
                </span>
              </div>
              <div className="bar-track">
                <div className="bar-fill" style={{
                  width:(mag/maxMover*100)+"%",
                  background: metric==="move" ? (up?"var(--buy)":"var(--sell)") : "var(--accent)"
                }}></div>
              </div>
              <div className="mover-sub">
                {m.n} trade{m.n===1?"":"s"} · {m.buys} buy · {m.sells} sell
                {metric==="move" && m.priced<m.n ? " · "+m.priced+" priced" : ""}
              </div>
            </div>
          );
        })}
      </div>

      <div className="card">
        <div className="card-h">Sector activity <span className="cnt">by est. volume</span></div>
        {stats.sectors.map(s=>(
          <div key={s.sector} className="bar-row">
            <div className="bar-top">
              <span className="bar-label">{s.sector}</span>
              <span className="bar-val">{abbrUSD(s.v)} · {s.n}×</span>
            </div>
            <div className="bar-track"><div className="bar-fill" style={{width:(s.v/maxSec*100)+"%",background:"var(--ink)"}}></div></div>
          </div>
        ))}
      </div>

      <div className="card">
        <div className="card-h">Party split <span className="cnt">by est. volume</span></div>
        <div className="party-split">
          <div className="d" style={{width:dPct+"%"}}>{dPct>12?("D "+dPct+"%"):""}</div>
          <div className="r" style={{width:(100-dPct)+"%"}}>{(100-dPct)>12?("R "+(100-dPct)+"%"):""}</div>
        </div>
        <div className="row-sub" style={{justifyContent:"space-between"}}>
          <span>Democrats · {stats.byParty.D.n} trades · {abbrUSD(stats.byParty.D.v)}</span>
          <span>Republicans · {stats.byParty.R.n} trades · {abbrUSD(stats.byParty.R.v)}</span>
        </div>
      </div>

      <div className="twocol">
        <div className="card" style={{marginBottom:0}}>
          <div className="card-h" style={{fontSize:14,color:"var(--buy)"}}>Top buys</div>
          {stats.buys.map((t,i)=>(
            <div key={t.id} className="leader">
              <span className="rk">{i+1}</span>
              <span><span className="tk">{t.ticker}</span><br/><span className="who">{t.member}</span></span>
              <span className="amt">{abbrUSD(t.est)}</span>
            </div>
          ))}
        </div>
        <div className="card" style={{marginBottom:0}}>
          <div className="card-h" style={{fontSize:14,color:"var(--sell)"}}>Top sells</div>
          {stats.sells.length===0 ? <div className="comm-reg">No sells in dataset.</div> :
            stats.sells.map((t,i)=>(
            <div key={t.id} className="leader">
              <span className="rk">{i+1}</span>
              <span><span className="tk">{t.ticker}</span><br/><span className="who">{t.member}</span></span>
              <span className="amt">{abbrUSD(t.est)}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   WATCHLIST
============================================================ */
function Watchlist({ watch, index, toggleWatch, onPick, onOpen }){
  const watched = watch.map(n=>index[n]).filter(Boolean);
  const watchedTrades = useMemo(()=>{
    const set = new Set(watch);
    return trades_sortRecent(Object.values(index).flatMap(m=>m.trades).filter(t=>set.has(t.member)));
  },[watch,index]);

  const ctx = watched.length
    ? watched.map(m=>`${m.name} (${m.party}-${m.state}): ${m.trades.length} trades, ${m.conflictCount} conflicts. Recent: ${m.trades.slice(0,3).map(t=>t.type+" "+t.ticker).join(", ")}`).join("\n")
    : "Watchlist is empty.";

  return (
    <div className="view">
      <p className="eyebrow">Watchlist</p>
      <h2 className="section-title">Your watch</h2>
      <p className="section-note">Saved members, kept across sessions. Tap ☆ on any member to follow them.</p>

      {watched.length===0
        ? <div className="empty"><span className="big">☆</span>Nothing watched yet.<br/>Open <b>Members</b> and tap the star to start tracking someone.</div>
        : <>
            <div className="stack" style={{marginBottom:16}}>
              {watched.map(m=>(
                <div key={m.name} className="row" role="button" onClick={()=>onPick(m.name)}>
                  <button className="star on" onClick={e=>{e.stopPropagation();toggleWatch(m.name);}}>★</button>
                  <div className="row-main">
                    <div className="row-name">{m.name} <span className={"party "+m.party}>{m.party}</span></div>
                    <div className="row-sub">
                      <span>{m.state} · {m.chamber} · {m.trades.length} trades</span>
                      {m.conflictCount>0 && <span className="conf">⚑ {m.conflictCount}</span>}
                    </div>
                  </div>
                  <span className="chev">{I.chev()}</span>
                </div>
              ))}
            </div>

            <AIPanel
              title="AI watchlist briefing"
              desc="Claude summarizes what the members you follow have been doing."
              autoPrompt={"Summarize recent trading activity and conflict risk for this watchlist of members. Lead with the most newsworthy item. Under 170 words.\n\n"+ctx}
              context={ctx}
            />

            <div className="card-h" style={{margin:"4px 0 11px"}}>Recent activity <span className="cnt">{watchedTrades.length}</span></div>
            <div className="stack">
              {watchedTrades.map(t=> <TradeCard key={t.id} t={t} onOpen={onOpen} />)}
            </div>
          </>
      }
    </div>
  );
}

function trades_sortRecent(arr){
  return [...arr].sort((a,b)=> new Date(b.tradeDate) - new Date(a.tradeDate));
}

/* ============================================================
   ROOT APP
============================================================ */
function App(){
  const [view, setView] = useState("feed");
  const [live, setLive] = useState([]);
  const [liveOk, setLiveOk] = useState(false);
  const [lastUpdated, setLastUpdated] = useState(null);
  const [refreshing, setRefreshing] = useState(false);
  const [, setTick] = useState(0);
  const [status, setStatus] = useState({senate:"loading",house:"loading",capitol:"loading"});
  const [watch, setWatch] = useState([]);
  const [detail, setDetail] = useState(null);
  const [memberView, setMemberView] = useState(null);
  const [committeeView, setCommitteeView] = useState(null);

  /* load watchlist */
  useEffect(()=>{ (async()=>{
    const raw = await store.get(WATCH_KEY);
    if(raw){ try{ const arr = JSON.parse(raw); if(Array.isArray(arr)) setWatch(arr); }catch(e){} }
  })(); },[]);
  /* persist watchlist */
  useEffect(()=>{ store.set(WATCH_KEY, JSON.stringify(watch)); },[watch]);

  /* live fetch from Supabase, one query per source; fresh snapshot each call */
  const loadLive = useCallback(async ()=>{
    setRefreshing(true);
    const tasks = [["senate","Senate"],["house","House"],["capitol","Capitol Trades"]];
    const collected = [];
    let any = false;
    await Promise.all(tasks.map(async ([key,source])=>{
      try{
        const norm = normalizeLive(await fetchTradesBySource(source), source);
        setStatus(s=>({...s,[key]:"live"}));
        if(norm.length){ collected.push(...norm); any = true; }
      }catch(e){
        setStatus(s=>({...s,[key]:"error"}));
      }
    }));
    if(any){ setLive(collected); setLiveOk(true); }   // replace (not append) — keeps last-good on total failure
    setLastUpdated(new Date());
    setRefreshing(false);
  },[]);

  /* fetch on mount, auto-refresh every 5 min, on tab focus, and daily at 5pm ET */
  useEffect(()=>{
    loadLive();
    const poll = setInterval(loadLive, 5*60*1000);
    const onFocus = ()=>loadLive();
    window.addEventListener("focus", onFocus);

    // Schedule daily refresh at 5pm ET
    const scheduleDaily5pmET = ()=>{
      const now = new Date();
      // Create a date for 5pm ET (17:00)
      const et = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
      et.setHours(17, 0, 0, 0);

      // If 5pm has already passed today, schedule for tomorrow
      if(et <= now) et.setDate(et.getDate() + 1);

      const msUntil5pm = et - now;
      const timeout = setTimeout(()=>{ loadLive(); scheduleDaily5pmET(); }, msUntil5pm);
      return timeout;
    };
    const dailyTimeout = scheduleDaily5pmET();

    return ()=>{ clearInterval(poll); clearTimeout(dailyTimeout); window.removeEventListener("focus", onFocus); };
  },[loadLive]);

  /* tick every 30s so the "updated Xm ago" label stays current */
  useEffect(()=>{
    const id = setInterval(()=>setTick(t=>t+1), 30000);
    return ()=>clearInterval(id);
  },[]);

  /* dataset = live Supabase rows when present, otherwise the offline sample.
     Dedupe by signature so any duplicate rows in the table never double-render. */
  const trades = useMemo(()=>{
    const source = (liveOk && live.length) ? live : SAMPLE.map(enrich);
    const seen = new Set();
    const uniq = [];
    for(const t of source){
      const s = sig(t);
      if(!seen.has(s)){ seen.add(s); uniq.push(t); }
    }
    return trades_sortRecent(uniq);
  },[live,liveOk]);

  /* member index */
  const index = useMemo(()=>{
    const idx = {};
    Object.keys(MEMBERS).forEach(name=>{
      idx[name] = {name, ...MEMBERS[name], trades:[], volume:0, conflictCount:0};
    });
    trades.forEach(t=>{
      if(!idx[t.member]) idx[t.member] = {name:t.member,party:t.party,state:t.state,chamber:t.chamber,trades:[],volume:0,conflictCount:0};
      const m = idx[t.member];
      m.trades.push(t); m.volume += t.est; if(t.isConflict) m.conflictCount++;
    });
    Object.values(idx).forEach(m=> m.trades = trades_sortRecent(m.trades));
    return idx;
  },[trades]);

  const toggleWatch = useCallback((name)=>{
    setWatch(w=> w.includes(name) ? w.filter(x=>x!==name) : [...w, name]);
  },[]);

  function openMember(name){ setMemberView(name); setView("members"); }
  function openCommittee(id){ setCommitteeView(id); setView("committees"); }

  /* nav resets drill-downs */
  function go(v){
    setView(v);
    if(v!=="members") setMemberView(null);
    if(v!=="committees") setCommitteeView(null);
  }

  let body;
  if(view==="feed") body = <Feed trades={trades} onOpen={setDetail} />;
  else if(view==="members") body = memberView
      ? <MemberProfile name={memberView} index={index} watch={watch} toggleWatch={toggleWatch} onOpen={setDetail} onBack={()=>setMemberView(null)} />
      : <MembersList index={index} watch={watch} toggleWatch={toggleWatch} onPick={setMemberView} />;
  else if(view==="committees") body = committeeView
      ? <CommitteeDetail id={committeeView} index={index} trades={trades} onOpenMember={openMember} onOpen={setDetail} onBack={()=>setCommitteeView(null)} />
      : <CommitteesList trades={trades} onPick={setCommitteeView} />;
  else if(view==="trends") body = <Trends trades={trades} />;
  else if(view==="watch") body = <Watchlist watch={watch} index={index} toggleWatch={toggleWatch} onPick={openMember} onOpen={setDetail} />;

  const navItems = [
    ["feed","Feed",I.feed],["members","Members",I.members],
    ["committees","Committees",I.committees],["trends","Trends",I.trends],
    ["watch","Watch",I.watch]
  ];
  const statusItems = [["senate","Sen",status.senate],["house","House",status.house],["capitol","Cap",status.capitol]];

  return (
    <div className="shell">
      <header className="hdr">
        <div className="hdr-row">
          <div>
            <h1 className="hdr-title">Capitol Watch<span className="dot">.</span></h1>
            <p className="hdr-sub">Congressional Trade Tracker</p>
            <button className="refresh-btn" onClick={()=>{ if(!refreshing) loadLive(); }} title="Refresh now">
              <span className={"refresh-ico"+(refreshing?" spin":"")}>↻</span>
              {refreshing ? "Updating…" : ("Updated " + timeAgoShort(lastUpdated))}
            </button>
          </div>
          <div className="status">
            {statusItems.map(([k,label,st])=>(
              <div key={k} className="status-item" title={label+": "+st}>
                <span className={"status-dot "+st}></span>
                <span className="status-label">{label}</span>
              </div>
            ))}
          </div>
        </div>
      </header>

      {body}

      <p className="footer-note">
        {liveOk ? "Live data via Supabase." : "Sample data (offline fallback)."} Disclosures of U.S. legislators are public record under the STOCK Act.
        Conflict flags are heuristic, not allegations of wrongdoing.
      </p>

      {detail && <DetailSheet t={detail} onClose={()=>setDetail(null)} onMember={openMember} />}

      <nav className="nav">
        {navItems.map(([k,label,icon])=>(
          <button key={k} className={"nav-btn"+(view===k?" on":"")} onClick={()=>go(k)}>
            <span className="ni">{icon()}</span>
            <span>{label}{k==="watch" && watch.length>0 ? " ("+watch.length+")" : ""}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script>
/* Transpile the app source with the CLASSIC JSX runtime, then run it. */
(function(){
  try{
    var src = document.getElementById("app-src").textContent;
    var out = Babel.transform(src, { presets: [["react", { runtime: "classic" }]] }).code;
    var el = document.createElement("script");
    el.appendChild(document.createTextNode(out));
    document.body.appendChild(el);
  }catch(err){
    console.error("Capitol Watch boot error:", err);
    var r = document.getElementById("root");
    if(r){ r.innerHTML = '<pre style="padding:24px;color:#C1392B;font:13px/1.6 monospace;white-space:pre-wrap">Capitol Watch failed to start — ' + ((err && err.message) || err) + '</pre>'; }
  }
})();
</script>
</body>
</html>
